<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GUARDIA CENMETEOPMO - DASHBOARD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&family=Roboto+Mono:wght@500;700&display=swap');

:root {
  --bg-main: #0a1118; /* Azul marino muy oscuro */
  --bg-panel: #131e2b;
  --border-panel: #20334a;
  --text-main: #e2e8f0;
  --accent: #4fd1c5;
}

body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  padding: 20px;
  background-color: var(--bg-main);
  background-image: radial-gradient(circle at top right, #112030, transparent 40%);
  color: var(--text-main);
  min-height: 100vh;
  box-sizing: border-box;
}

/* Contenedor Principal Dashboard */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  max-width: 1400px;
  margin: 0 auto;
}

@media (min-width: 1024px) {
  .dashboard-grid {
    grid-template-columns: 1fr 1fr;
  }
}

/* Paneles */
.panel {
  background: var(--bg-panel);
  border: 1px solid var(--border-panel);
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

/* Encabezado Principal (Ocupa ambas columnas) */
.header-panel {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  overflow: hidden;
}

.header-panel::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, #3498db, #2ecc71);
}

h2.main-header {
  font-family: 'Montserrat', sans-serif;
  font-size: 2.2em;
  font-weight: 700;
  color: #ffffff;
  margin: 10px 0;
  text-align: center;
  letter-spacing: 2px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}

/* Relojes y Logo */
.top-bar {
  display: flex;
  width: 100%;
  justify-content: space-around;
  align-items: center;
  margin-top: 15px;
}

.clock-widget {
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid #2a3f5a;
  padding: 15px 25px;
  border-radius: 12px;
  text-align: center;
  min-width: 180px;
}

.clock-label {
  font-size: 0.8em;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #8babc4;
  margin-bottom: 5px;
}

.clock {
  font-family: 'Roboto Mono', monospace;
  font-size: 2.2em;
  font-weight: 700;
  color: var(--accent);
  text-shadow: 0 0 10px rgba(79, 209, 197, 0.3);
}

.logo-container img {
  height: 160px;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
}

/* Contenedor de Botones (Panel Izquierdo) */
.btn-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}

.btn {
  padding: 14px 10px;
  font-family: 'Inter', sans-serif;
  font-size: 0.85em;
  font-weight: 600;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background-size: 200% 100%;
  transition: all 0.2s ease;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 12px rgba(0,0,0,0.5);
  filter: brightness(1.1);
}

.btn-wide {
  grid-column: 1 / -1;
  padding: 16px;
  font-size: 0.95em;
}

/* Colores Originales Exactos */
.btn-purple { background-image: linear-gradient(90deg,#8e44ad,#4a235a); }
.btn-blue { background-image: linear-gradient(90deg,#3498db,#2c3e50); }
.btn-green { background-image: linear-gradient(90deg,#2ecc71,#27ae60); }
.btn-orange { background-image: linear-gradient(90deg,#f39c12,#d35400); }
.btn-red { background-image: linear-gradient(90deg,#e74c3c,#c0392b); }
.btn-gold { background-image: linear-gradient(90deg,#f1c40f,#f39c12); }
.btn-turquoise { background-image: linear-gradient(90deg,#1abc9c,#16a085); }
.btn-pink { background-image: linear-gradient(90deg,#ff6b81,#c0392b); }
.btn-brown { background-image: linear-gradient(90deg,#a0522d,#6e2c00); }
.btn-lightgray { background-image: linear-gradient(90deg,#bdc3c7,#7f8c8d); }
.btn-darkgray { background-image: linear-gradient(90deg,#7f8c8d,#2c3e50); }
.btn-lightblue { background-image: linear-gradient(90deg,#5dade2,#2e86c1); }
.btn-lime { background-image: linear-gradient(90deg,#a3e635,#6f9e18); }
.btn-coral { background-image: linear-gradient(90deg,#ff7f50,#e74c3c); }
.btn-salmon { background-image: linear-gradient(90deg,#fa8072,#e74c3c); }
.btn-navy { background-image: linear-gradient(90deg,#34495e,#2c3e50); }
.btn-oldgold { background-image: linear-gradient(90deg,#b7950b,#7d6608); }
.btn-lightviolet { background-image: linear-gradient(90deg,#af7ac5,#7d3c98); }
.btn-emerald { background-image: linear-gradient(90deg,#2ecc71,#27ae60); }
.btn-skyblue { background-image: linear-gradient(90deg,#87ceeb,#3498db); }
.btn-magenta { background-image: linear-gradient(90deg,#ff00ff,#8e44ad); }
.btn-indigo { background-image: linear-gradient(90deg,#4b0082,#2c3e50); }
.btn-beige { background-image: linear-gradient(90deg,#f5f5dc,#d7ccc8); }
.btn-mint { background-image: linear-gradient(90deg,#98ff98,#2ecc71); }
.btn-chocolate { background-image: linear-gradient(90deg,#d2691e,#8b4513); }
.btn-darkcyan { background-image: linear-gradient(90deg,#008b8b,#005555); }

/* Slideshow (Panel Derecho) */
.slideshow-container {
  width: 100%;
  height: 100%;
  min-height: 400px;
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  background: #000;
}

.slideshow-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  opacity: 0;
  transition: opacity 1s ease-in-out;
}

.slideshow-container img.active {
  opacity: 1;
}

/* Botones flotantes */
.floating-container {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
  pointer-events: none; /* Deja clickear a través de la caja invisible */
  z-index: 1000;
}

.floating-btn {
  pointer-events: auto; /* Reactiva el click en los botones */
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.6);
  cursor: pointer;
  transition: transform 0.2s ease;
  background: #131e2b;
  border: 2px solid #20334a;
}

.floating-btn:hover {
  transform: scale(1.1);
}

/* Pie de firma */
footer {
  grid-column: 1 / -1;
  margin-top: 20px;
  padding: 15px;
  font-size: 0.85em;
  text-align: center;
  color: #5d758f;
  border-top: 1px solid var(--border-panel);
}

@media (max-width: 768px) {
  .top-bar {
    flex-direction: column;
    gap: 15px;
  }
  .slideshow-container {
    min-height: 300px;
  }
}
</style>
</head>
<body>

<script>
// Slideshow
let slideIndex = 0;
const slides = document.querySelectorAll(".slideshow-container img");
function showSlides() {
  slides.forEach(slide => slide.classList.remove("active"));
  slides[slideIndex].classList.add("active");
  slideIndex = (slideIndex + 1) % slides.length;
}
setInterval(showSlides, 5000);

// Relojes: Forzando UTC a +4 horas de la hora local
function updateClocks() {
  const now = new Date();
  
  // 1. Obtener la hora local exacta del computador
  const localHours = now.getHours();
  const localMinutes = String(now.getMinutes()).padStart(2, '0');
  const localSeconds = String(now.getSeconds()).padStart(2, '0');
  
  document.getElementById('localClock').textContent = 
    `${String(localHours).padStart(2, '0')}:${localMinutes}:${localSeconds}`;
  
  // 2. Forzar la hora UTC sumando exactamente 4 horas
  // Usamos % 24 para que si son las 22:00 local, UTC marque 02:00 del día siguiente
  const utcHoursForzado = (localHours + 4) % 24;
  
  document.getElementById('utcClock').textContent = 
    `${String(utcHoursForzado).padStart(2, '0')}:${localMinutes}:${localSeconds}`;
}

setInterval(updateClocks, 1000);
updateClocks();
</script>
